services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: accountdb
      POSTGRES_USER: accountuser
      POSTGRES_PASSWORD: accountpass
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_accountdb_data:/var/lib/postgresql/data

volumes:
  postgres_accountdb_data:

networks:
  web:
    external: true