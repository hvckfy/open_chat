version: "3.9"

services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf.d:/etc/nginx/conf.d
      - /etc/nginx/certs:/etc/nginx/certs:ro
    networks:
      - web
    restart: unless-stopped

networks:
  web:
    external: true