version: '3.8'

services:
  openldap:
    image: osixia/openldap:latest
    container_name: openldap
    environment:
      LDAP_ORGANISATION: "heckfy-homelab"
      LDAP_DOMAIN: "heckfy.local"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_CONFIG_PASSWORD: "password"
    ports:
      - "389:389"   # LDAP port
      - "636:636"   # LDAPS port (TLS)
    volumes:
      - ldap_data:/var/lib/ldap
    networks:
      - ldap-net
    restart: unless-stopped
    hostname: ldap

  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8080:80"
    depends_on:
      - openldap
    networks:
      - ldap-net
    restart: always

networks:
  ldap-net:
    driver: bridge

volumes:
  ldap_data:
  ldap_config:


