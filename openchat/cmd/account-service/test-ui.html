<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Service - Test UI</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
background:#1a1a2e;
color:#eee;
padding:20px;
min-height:100vh
}

h1{
text-align:center;
margin-bottom:30px;
color:#00d9ff
}

.container{
max-width:1200px;
margin:0 auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px
}

.card{
background:#16213e;
border-radius:12px;
padding:20px;
border:1px solid #0f3460
}

.card h2{
color:#00d9ff;
margin-bottom:5px;
font-size:18px
}

.method{
display:inline-block;
padding:3px 8px;
border-radius:4px;
font-size:12px;
font-weight:bold;
margin-bottom:15px
}

.method.post{background:#49be25;color:#000}
.method.get{background:#61affe;color:#000}
.method.delete{background:#f93e3e;color:#fff}

.endpoint{
color:#888;
font-size:13px;
margin-bottom:15px;
font-family:monospace
}

label{
display:block;
margin-bottom:5px;
color:#aaa;
font-size:14px
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #0f3460;
border-radius:6px;
background:#1a1a2e;
color:#fff;
font-size:14px
}

input:focus,textarea:focus{
outline:none;
border-color:#00d9ff
}

button{
width:100%;
padding:12px;
background:#00d9ff;
color:#000;
border:none;
border-radius:6px;
font-size:14px;
font-weight:bold;
cursor:pointer
}

button:hover{background:#00b8d9}

.response{
margin-top:15px;
padding:12px;
background:#0d1b2a;
border-radius:6px;
font-family:monospace;
font-size:13px;
white-space:pre-wrap;
word-break:break-all;
max-height:200px;
overflow-y:auto;
display:none
}

.response.show{display:block}
.response.success{border-left:3px solid #49be25}
.response.error{border-left:3px solid #f93e3e}

.config-bar{
background:#16213e;
padding:15px 20px;
border-radius:12px;
margin-bottom:20px;
display:flex;
align-items:center;
gap:15px;
flex-wrap:wrap
}

.status{
margin-left:auto;
display:flex;
align-items:center;
gap:8px
}

.status-dot{
width:10px;
height:10px;
border-radius:50%;
background:#f93e3e
}

.status-dot.online{background:#49be25}

.token-display{
background:#0d1b2a;
padding:10px;
border-radius:6px;
font-family:monospace;
font-size:11px;
word-break:break-all;
margin-top:10px;
max-height:60px;
overflow-y:auto
}
</style>
</head>

<body>

<h1>Account Service - Test UI</h1>

<div class="config-bar">
<label>Base URL:</label>
<input type="text" id="baseUrl" value="http://localhost:8080">
<button onclick="checkHealth()" style="width:auto;padding:10px 20px">Check Health</button>

<div class="status">
<div class="status-dot" id="statusDot"></div>
<span id="statusText">Unknown</span>
</div>
</div>

<div class="container">

<div class="card">
<h2>LDAP Login</h2>
<span class="method post">POST</span>
<div class="endpoint">/login-ldap</div>

<label>Username</label>
<input type="text" id="ldap-username">

<label>Password</label>
<input type="password" id="ldap-password">

<button onclick="ldapLogin()">Login via LDAP</button>
<div class="response" id="ldap-response"></div>
</div>


<div class="card">
<h2>Local Login</h2>
<span class="method post">POST</span>
<div class="endpoint">/login-local</div>

<label>Username</label>
<input type="text" id="local-username">

<label>Password</label>
<input type="password" id="local-password">

<button onclick="localLogin()">Login</button>
<div class="response" id="local-response"></div>
</div>


<div class="card">
<h2>Local Register</h2>
<span class="method post">POST</span>
<div class="endpoint">/register-local</div>

<label>Username</label>
<input type="text" id="reg-username">

<label>Password</label>
<input type="password" id="reg-password">

<button onclick="localRegister()">Register</button>
<div class="response" id="reg-response"></div>
</div>


<div class="card">
<h2>Generate Keychain</h2>
<span class="method get">GET</span>
<div class="endpoint">/api/gen-keys</div>

<p style="color:#888;font-size:13px;margin-bottom:15px">
Requires access_token cookie
</p>

<button onclick="genKeys()">Generate Keys</button>
<div class="response" id="genkeys-response"></div>
</div>


<div class="card">
<h2>Get Profile</h2>
<span class="method get">GET</span>
<div class="endpoint">/api/profile</div>

<button onclick="getProfile()">Get Profile</button>
<div class="response" id="profile-response"></div>
</div>


<div class="card">
<h2>Stored Tokens</h2>

<p style="color:#888;font-size:13px;margin-bottom:10px">
Saved refresh token
</p>

<div class="token-display" id="stored-refresh">No token stored</div>

<button onclick="copyStoredToken()" style="margin-top:10px">Copy</button>

</div>

</div>

<script>

let storedRefreshToken = localStorage.getItem('refreshToken') || ''

function getBaseUrl(){
return document.getElementById('baseUrl').value.replace(/\/$/,'')
}

function showResponse(id,data,error=false){
const el=document.getElementById(id)

el.textContent=typeof data==='object'
?JSON.stringify(data,null,2)
:data

el.className='response show '+(error?'error':'success')
}

function saveRefreshToken(token){
storedRefreshToken=token
localStorage.setItem('refreshToken',token)
document.getElementById('stored-refresh').textContent=token
}

function copyStoredToken(){
navigator.clipboard.writeText(storedRefreshToken)
}

async function checkHealth(){

const dot=document.getElementById('statusDot')
const text=document.getElementById('statusText')

try{

const res=await fetch(getBaseUrl()+'/health')

if(res.ok){
dot.classList.add('online')
text.textContent='Online'
}else{
dot.classList.remove('online')
text.textContent='Error'
}

}catch{

dot.classList.remove('online')
text.textContent='Offline'

}
}


async function ldapLogin(){

const username=document.getElementById('ldap-username').value
const password=document.getElementById('ldap-password').value

try{

const res=await fetch(getBaseUrl()+'/login-ldap',{
method:'POST',
headers:{'Content-Type':'application/json'},
credentials:'include',
body:JSON.stringify({username,password})
})

const data=await res.json()

showResponse('ldap-response',data,!res.ok)

if(res.ok && data.refresh_token){
saveRefreshToken(data.refresh_token)
}

}catch(e){

showResponse('ldap-response',e.message,true)

}

}


async function localLogin(){

const username=document.getElementById('local-username').value
const password=document.getElementById('local-password').value

try{

const res=await fetch(getBaseUrl()+'/login-local',{
method:'POST',
headers:{'Content-Type':'application/json'},
credentials:'include',
body:JSON.stringify({username,password})
})

const data=await res.json()

showResponse('local-response',data,!res.ok)

if(res.ok && data.refresh_token){
saveRefreshToken(data.refresh_token)
}

}catch(e){

showResponse('local-response',e.message,true)

}

}


async function localRegister(){

const username=document.getElementById('reg-username').value
const password=document.getElementById('reg-password').value

try{

const res=await fetch(getBaseUrl()+'/register-local',{
method:'POST',
headers:{'Content-Type':'application/json'},
credentials:'include',
body:JSON.stringify({username,password})
})

const data=await res.json()

showResponse('reg-response',data,!res.ok)

}catch(e){

showResponse('reg-response',e.message,true)

}

}


async function genKeys(){

try{

const res=await fetch(getBaseUrl()+'/api/gen-keys',{
method:'GET',
credentials:'include'
})

const data=await res.json()

showResponse('genkeys-response',data,!res.ok)

}catch(e){

showResponse('genkeys-response',e.message,true)

}

}


async function getProfile(){

try{

const res=await fetch(getBaseUrl()+'/api/profile',{
method:'GET',
credentials:'include'
})

const data=await res.json()

showResponse('profile-response',data,!res.ok)

}catch(e){

showResponse('profile-response',e.message,true)

}

}

checkHealth()

</script>

</body>
</html>
